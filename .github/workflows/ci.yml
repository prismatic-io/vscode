name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise exec -- bun install --frozen-lockfile
      - run: mise run ci

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise exec -- bun install --frozen-lockfile
      - run: npm install -g @prismatic-io/prism
      # @vscode/test-electron launches a real VS Code instance, which needs a display.
      # xvfb-run wraps the command in a virtual X server; -a picks a free display number.
      - run: xvfb-run -a mise run test:integration
