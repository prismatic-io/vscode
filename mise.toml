[tools]
node = "24"

[tasks.lint]
description = "Run Biome lint and format checks"
run = "npm run check"

[tasks.check-types]
description = "Run TypeScript type checking"
run = "npm run check-types"

[tasks.test]
description = "Run Jest test suite"
run = "npm test"

[tasks."build:icons"]
description = "Generate icon font from SVGs"
sources = ["resources/icons/**/*.svg", ".fantasticonrc.json"]
outputs = ["resources/fonts/prismatic-icons.woff2", "resources/fonts/prismatic-icons.json"]
run = "npm run build:icons"


[tasks.build]
description = "Build the extension"
depends = ["check-types"]
env = { NODE_ENV = "production" }
run = "npm run esbuild:run -- --production"

[tasks.package]
description = "Package extension into .vsix"
depends = ["build"]
run = "npm run package"

[tasks.fix]
description = "Auto-fix lint/format issues, then run full CI validation"
run = "npm run check:fix"

[tasks.ci]
description = "Run full CI validation pipeline"
depends = ["lint", "check-types", "test", "package"]

[tasks."ci:fix"]
description = "Auto-fix then validate"
depends = ["fix", "ci"]

[tasks."publish:vsce"]
description = "Publish .vsix to VS Code Marketplace"
run = "npm run publish:vsce"

[tasks."publish:ovsx"]
description = "Publish .vsix to OpenVSX"
run = "npm run publish:ovsx"

[tasks.publish]
description = "Publish to both VS Code Marketplace and OpenVSX"
depends = ["publish:vsce", "publish:ovsx"]

[tasks.version-bump]
description = "Bump package.json version (set BUMP_TYPE=patch|minor|major)"
run = "npm version $BUMP_TYPE --no-git-tag-version"

[tasks.release]
description = "Trigger a release (usage: mise run release -- patch|minor|major)"
run = """
BUMP="${1:?Usage: mise run release -- patch|minor|major}"
if [ "$BUMP" != "patch" ] && [ "$BUMP" != "minor" ] && [ "$BUMP" != "major" ]; then
  echo "ERROR: Invalid bump type '$BUMP'. Must be patch, minor, or major."
  exit 1
fi
gh workflow run release.yml -f bump="$BUMP"
echo "Release workflow triggered with bump=$BUMP"
"""
